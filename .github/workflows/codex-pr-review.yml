name: Codex PR review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: codex-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  codex_review:
    name: Review pull request
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      OPENAI_API_KEY_AVAILABLE: ${{ secrets.OPENAI_API_KEY != '' }}
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - name: Check out pull request merge ref
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Run Codex review
        id: run_codex
        if: ${{ env.OPENAI_API_KEY_AVAILABLE == 'true' }}
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/review.md
          output-file: codex-pr-review.md
          sandbox: read-only
          safety-strategy: drop-sudo
          codex-args: '["--ephemeral"]'

      - name: Skip when OpenAI API key is missing
        if: ${{ env.OPENAI_API_KEY_AVAILABLE != 'true' }}
        run: echo "OPENAI_API_KEY is not configured; skipping Codex review."

  post_feedback:
    name: Post review feedback
    runs-on: ubuntu-latest
    needs: codex_review
    if: ${{ needs.codex_review.outputs.final_message != '' }}
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Create or update Codex review comment
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex_review.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            const marker = '<!-- codex-pr-review -->';
            const finalMessage = (process.env.CODEX_FINAL_MESSAGE || '').trim();
            if (!finalMessage) {
              core.info('Codex returned no review message.');
              return;
            }

            const body = [
              marker,
              '## Codex PR review',
              '',
              finalMessage,
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });
