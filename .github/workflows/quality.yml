name: Quality

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
      - dev
      - "intent/**"
  workflow_dispatch:

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  project_quality:
    name: Project quality checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun run lint

      - name: Run unit tests
        run: bun test

      - name: Run AI-DLC validation
        run: bun aidlc:doctor

      - name: Run build when configured
        run: |
          if bun -e "const scripts = require('./package.json').scripts || {}; process.exit(scripts.build ? 0 : 1)"; then
            bun run build
          else
            echo "No build script configured; skipping build."
          fi
